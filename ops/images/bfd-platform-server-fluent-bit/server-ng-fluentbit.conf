[SERVICE]
    # Flush logs every 1 second
    Flush 1
    # Wait 60 seconds during shutdown to flush remaining logs
    Grace 60
    # Directory for filesystem buffering
    storage.path /tmp/log/flb-storage/
    # Limit chunks stored 'up' in memory. Each chunk is approx. 4 - 5 MB, so 32 * 5 = 160 MB which
    # is well under the 256 MB minimum granted to Fluent Bit containers in server and server-ng
    # Tasks
    storage.max_chunks_up 32
    # Flush backlog chunks to destinations during shutdown (prevents log loss)
    storage.backlog.flush_on_shutdown On
    # Minimum seconds between retries
    scheduler.base 10
    # Maximum seconds between retries (exponential backoff cap)
    scheduler.cap 60

[INPUT]
    Name forward
    unix_path /var/run/fluent.sock
    # Run input in separate thread to prevent blocking
    threaded true
    # Enable filesystem buffering for persistence
    storage.type filesystem

[FILTER]
    Name rewrite_tag
    Match_Regex ^(?!maybe_json).*
    Rule $log ^\{.*\}$ maybe_json false

[OUTPUT]
    Name cloudwatch_logs
    Match_Regex maybe_json
    region ${AWS_REGION}
    log_key log
    log_group_name ${MESSAGES_LOG_GROUP}
    log_stream_name messages/server/${ECS_TASK_ID}
    retry_limit 2
    workers 2
    # Maximum disk space for buffered data for this output
    storage.total_limit_size 5G
