# Not intended for use outside of the "Deploy Tofuervices" Workflow. This is defined just
# to make things a little DRYer

name: "Deploy Tofuservices Layer"

on:
  workflow_call:
    inputs:
      service-type:
        type: string
        required: true
      env-or-account:
        type: string
        required: true
      account-type:
        type: string
        required: true
      matrix-json:
        type: string
        required: true
      layer-level:
        type: string
        required: true
      aws-region:
        type: string
        required: true
      skip-applies:
        type: boolean
        required: true
      # Typically, this would be an environment variable, but Actions does not support the "env"
      # context within a "runs-on", so this is next best thing
      service-runner-overrides-json:
        type: string
        required: false
        default: |
          {
            "database": "small",
            "migrator": "small",
            "migrator-ng": "small"
          }
      per-service-vars-json:
        type: string
        required: false
      git-ref:
        type: string
        required: false

env:
  ACCOUNT_ROLE_MAP: |
    {
      "prod": "${{ secrets.PROD_ACCOUNT_GHA_ROLE_ARN }}",
      "non-prod": "${{ secrets.NON_PROD_ACCOUNT_GHA_ROLE_ARN }}"
    }
  DEFAULT_ENVIRONMENT_LOG_GROUP: /bfd/${{ inputs.env-or-account }}/github_actions/deploy_env_services/tofu
  DEFAULT_PLATFORM_LOG_GROUP: /bfd/platform/github_actions/deploy_platform_services/tofu

jobs:
  deploy-layer:
    if: ${{ fromJson(inputs.matrix-json)[inputs.layer-level] != fromJson('[]') }}
    strategy:
      fail-fast: false
      matrix:
        context: ${{ fromJson(inputs.matrix-json)[inputs.layer-level] }}
    runs-on:
      - codebuild-bfd-${{ inputs.account-type }}-platform-${{ fromJson(inputs.service-runner-overrides-json)[matrix.context.service] || 'lambda' }}-${{ github.run_id }}-${{ github.run_attempt }}
        service:${{ matrix.context.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.git-ref || github.ref }}

      - name: Get role ARN
        id: get-role-arn
        run: |
          role_arn="$(jq -r --arg account_type "${{ inputs.account-type }}" '.[$account_type]' <<<"$ACCOUNT_ROLE_MAP")"

          echo "::add-mask::$role_arn"
          echo "role-arn=$role_arn" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.get-role-arn.outputs.role-arn }}
          role-session-name: deploy-${{ matrix.context.layer }}-${{ matrix.context.service }}-${{ github.run_id }}-${{ github.run_attempt }}
          aws-region: ${{ inputs.aws-region }}

      - name: Get tofu vars for service
        id: get-tofu-vars
        env:
          ALL_VARS_JSON: ${{ inputs.per-service-vars-json || '{}' }}
          SERVICE: ${{ matrix.context.service }}
        run: |
          tofu_vars_json="$(jq -c --arg service "$SERVICE" '.[$service] // {}' <<<"$ALL_VARS_JSON")"

          echo "tofu-vars-json=$tofu_vars_json" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ matrix.context.service }}
        uses: ./.github/actions/bfd-deploy-tofuservice
        with:
          service-type: ${{ inputs.service-type }}
          env-or-account: ${{ inputs.env-or-account }}
          service-path: ${{ matrix.context.path }}
          cw-log-group: ${{ inputs.service-type == 'ENVIRONMENT' && env.DEFAULT_ENVIRONMENT_LOG_GROUP || env.DEFAULT_PLATFORM_LOG_GROUP }}
          cw-log-stream: ${{ matrix.context.service }}-${{ github.run_id }}-${{ github.run_attempt }}
          skip-apply: ${{ inputs.skip-applies && 'true' || 'false' }}
          tofu-vars-json: ${{ steps.get-tofu-vars.outputs.tofu-vars-json }}
