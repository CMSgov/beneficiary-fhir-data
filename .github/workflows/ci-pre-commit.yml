name: CI - Pre-commit Checks
on: [push, pull_request]

jobs:
  prek:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: j178/prek-action@v1
        with:
          extra-args: --hook-stage pre-commit --from-ref {{GITHUB_BASE_REF}} --to-ref {{GITHUB_HEAD_REF}} # this is default hook-stage, but we want to override the default extra-args of --all-files
      - uses: j178/prek-action@v1
        with:
          extra-args: --hook-stage pre-push --from-ref {{GITHUB_BASE_REF}} --to-ref {{GITHUB_HEAD_REF}}
