name: CI - Python

on:
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.toml"
      - "**/uv.lock"
      - ".github/workflows/ci-python.yml"
  merge_group:

env:
  BASE_COMMIT: ""
  GH_TOKEN: ${{ github.token }}
  # Pin tool versions to match workspace configuration
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.5.18"

jobs:
  matrix-pytest:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        projects: [
            {
              projectName: "sftp-outbound-transfer-lambda",
              projectRoot: "ops/services/02-eft/lambda_src/sftp_outbound_transfer",
              testsRoot: "ops/services/02-eft/lambda_src/sftp_outbound_transfer/tests",
              uvCommand: "uv sync",
              pytestCommand: "uv run pytest",
              pythonVersion: "3.13",
            },
            {
              projectName: "locust",
              projectRoot: "apps/utils/locust_tests",
              testsRoot: "apps/utils/locust_tests",
              uvCommand: "uv sync --group lambda-run-locust",
              # no tests
              pytestCommand: "echo 'no tests'",
              pythonVersion: "3.13",
            },
            {
              projectName: "idr-pipeline",
              projectRoot: "apps/bfd-pipeline-idr",
              testsRoot: "apps/bfd-pipeline-idr",
              uvCommand: "uv sync",
              pytestCommand: "IDR_LOAD_TYPE=initial uv run pytest && IDR_LOAD_TYPE=incremental uv run pytest",
              pythonVersion: "3.14",
            },
          ]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK (only for IDR pipeline)
        if: matrix.project == 'apps/bfd-pipeline-idr'
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "corretto"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: |
          cd ${{ github.workspace }}
          uv python install 3.13.0

      - name: Install workspace dependencies
        run: |
          cd ${{ github.workspace }}
          uv sync --all-groups

      - name: Run linting (ruff checks)
        run: |
          cd ${{ github.workspace }}
          uv run ruff check --fix

      - name: Run formatting check (ruff format)
        run: |
          cd ${{ github.workspace }}
          uv run ruff format --check
          
      - name: Run type checking (pyright)
        run: |
          cd ${{ github.workspace }}
          uv run pyright
          
          # Formatting
          uv run ruff format --check .
          
          # Type checking
          uv run pyright .
          # tests
          ${{ matrix.projects.pytestCommand }} ${{ github.workspace }}/${{ matrix.projects.testsRoot }}
