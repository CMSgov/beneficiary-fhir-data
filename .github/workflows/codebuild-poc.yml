name: Hello World
on:
  workflow_dispatch:
  push:

permissions:
  id-token: write # This is required for requesting the AWS IAM OIDC JWT
  contents: write # This is required for actions/checkout
defaults:
  run:
    shell: bash

jobs:
  Hello-World-Job:
    runs-on:
      - codebuild-bfd-mgmt-ci-small-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - run: echo "Hello World"
