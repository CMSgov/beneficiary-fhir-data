---
name: "Deploy Platform Services"
on:
  workflow_dispatch:
    inputs:
      account-type:
        description: The BFD account type to deploy services to
        required: true
      services:
        description: Comma-separated list of services to deploy
        default: >-
          bootstrap,
          config,
          alerting,
          backup,
          ecr,
          network
        required: true
      all-vars-json:
        description: >-
          Tofu plan variables per-service in JSON; see Workflow for format
        required: false
      aws-region:
        description: >-
          Override the AWS Region
        default: us-east-1
        type: choice
        options:
          - us-east-1
          - us-west-2
        required: true
      skip-applies:
        description: >-
          If true, skips the apply step for each Terraservice such that only the plans are generated
        default: false
        required: false
        type: boolean
      git-ref:
        description: >-
          The Git reference (branch, tag, commit, etc.) to use for deploy.
          Defaults to the selected branch/tag
        default: ""
        required: false
  workflow_call:
    inputs:
      account-type:
        type: string
        description: The BFD account type to deploy services to
        required: true
      services:
        type: string
        description: Comma-separated list of services to deploy
        default: >-
          bootstrap,
          config,
          alerting,
          backup,
          ecr,
          network
        required: false
      all-vars-json:
        type: string
        description: >-
          Tofu plan variables per-service in JSON; see Workflow for format
        required: false
      aws-region:
        type: string
        description: >-
          Override the AWS Region
        default: us-east-1
        required: false
      skip-applies:
        type: boolean
        description: >-
          If true, skips the apply step for each Terraservice such that only the plans are generated
        default: false
        required: false
      git-ref:
        type: string
        description: >-
          The Git reference (branch, tag, commit, etc.) to use for deploy.
          Defaults to the selected branch/tag
        default: ""
        required: false


permissions:
  id-token: write # This is required for requesting the AWS IAM OIDC JWT
  contents: write # This is required for actions/checkout

env:
  DEPLOY_JOBS_MATRIX_JSON: |
    {
      "000": [
        { "layer": "000", "service": "bootstrap", "runner": "lambda" }
      ],
      "01": [
        { "layer": "01", "service": "config", "runner": "lambda" }
      ],
      "02": [
        { "layer": "02", "service": "alerting", "runner": "lambda" },
        { "layer": "02", "service": "backup", "runner": "lambda" },
        { "layer": "02", "service": "ecr", "runner": "lambda" },
        { "layer": "02", "service": "network", "runner": "lambda" }
      ]
    }

defaults:
  run:
    shell: bash

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      deploy-jobs-matrix-json: ${{ steps.get-deploy-jobs-matrix-json.outputs.deploy-jobs-matrix-json }}
      layers: ${{ steps.get-deploy-jobs-matrix-json.outputs.layers }}
    steps:
      - name: Get filtered deploy jobs matrix JSON as output
        id: get-deploy-jobs-matrix-json
        env:
          SERVICES: ${{ inputs.services }}
        run: |
          deploy_jobs_matrix_json="$(
            jq -c --arg services "$SERVICES" '
              # Convert the CSV list of services into an array
              ($services | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $filterServices
              | to_entries
              | map(
                  .value |= map(select(.service | IN($filterServices[])))
                )
              | from_entries
            ' <<<"$DEPLOY_JOBS_MATRIX_JSON"
          )"
          jq -c <<<"$deploy_jobs_matrix_json"

          # Get an ordered array of layers to deploy from the filtered list of services that will
          # be deployed
          layers="$(
            jq '
              to_entries
                | map(select(.value != [] and .value != null) | .key)
                | sort
            ' <<<"$deploy_jobs_matrix_json"
          )"
          jq -c <<<"$layers"

          echo "deploy-jobs-matrix-json=$deploy_jobs_matrix_json" >> "$GITHUB_OUTPUT"
          echo "layers=$layers" >> "$GITHUB_OUTPUT"

  deploy-layers:
    uses: ./.github/workflows/_deploy-platform-service-layer.yml
    needs: [setup]
    strategy:
      matrix:
        layer-level: ${{ fromJson(needs.setup.outputs.layers) }}
      fail-fast: true
      # We "abuse" the fact that matrix jobs with a maximum parallelism of 1 will run in the order
      # of the matrix input, that being "layer-level"
      max-parallel: 1
    permissions:
      contents: read
      id-token: write
    with:
      layer-level: ${{ matrix.layer-level }}
      account-type: ${{ inputs.account-type }}
      matrix-json: ${{ needs.setup.outputs.deploy-jobs-matrix-json }}
      aws-region: ${{ inputs.aws-region }}
      skip-applies: ${{ inputs.skip-applies }}
      all-vars-json: ${{ inputs.all-vars-json }}
      git-ref: ${{ inputs.git-ref || github.ref }}
    secrets: inherit
