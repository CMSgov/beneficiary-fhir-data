name: Deploy Tofuservice
description: Composite action to deploy a BFD Tofuservice
inputs:
  service-type:
    description: Type of Tofuservice. Either "PLATFORM" or "ENVIRONMENT"
  env-or-account:
    description: The environment (if env service) or account (if platform service)
    required: true
  service-path:
    description: "The path to the Tofuservice relative to the root of the repository"
    required: true
  cw-log-group:
    description: >-
      Name of CloudWatch Log Group to submit OpenTofu logs to; will be created if necessary
    required: true
  cw-log-stream:
    description: >-
      Name of CloudWatch Log Stream to submit OpenTofu logs to; will be created if necessary
    required: true
  skip-apply:
    description: >-
      Skip the apply of the given Tofuservice. Useful for logging the plan without making any
      modifications
    default: "false" # Composite Action inputs must be strings
    required: false
  tofu-vars-json:
    description: JSON object map of variables to their values
    required: false
    default: "{}"
runs:
  using: composite
  steps:
    - name: Setup OpenTofu and shell environment
      id: setup-tofu
      uses: ./.github/actions/bfd-setup-tofu
      with:
        service-path: ${{ inputs.service-path }}
        cw-log-group: ${{ inputs.cw-log-group }}
        cw-log-stream: ${{ inputs.cw-log-stream }}
        tofu-vars-json: ${{ inputs.tofu-vars-json }}

    # This step is necessary as it seems that some objects (like "github" or "inputs") are
    # unavailable when the top-level "env" is evaluated for Composite Actions
    - name: Setup environment
      run: |
        echo "TOFU_CI_SCRIPT=${{ github.workspace }}/.github/scripts/tofu-ci.sh" >> $GITHUB_ENV
      shell: bash

    - name: Get parent environment
      if: ${{ inputs.service-type == "ENVIRONMENT" }}
      id: get-parent-env
      env:
        ENV_OR_ACCOUNT: ${{ inputs.env-or-account }}
      run: |
        parent_env="$(echo "$ENV_OR_ACCOUNT" | grep -Po '(prod|sandbox|test)$')"

        echo "parent-env=$parent_env" >> $GITHUB_OUTPUT
      shell: bash

    - name: OpenTofu init
      env:
        SERVICE_TYPE: ${{ inputs.service-type }}
        PARENT_ENV: ${{ steps.get-parent-env.outputs.parent-env }}
        ENV_OR_ACCOUNT: ${{ inputs.env-or-account }}
      run: |
        tofu --version

        # Often OpenTofu stdout/stderr logs contain sensitive/private information. GHA logs are
        # available for anyone logged in with a GitHub account to view, and so this information must
        # be protected. Instead of logging to stdout, all potentially sensitive OpenTofu log output
        # is instead logged to CloudWatch
        if [[ $SERVICE_TYPE == "PLATFORM" ]]; then
          TF_WORKSPACE=default tofu init \
            -var account_type="$ENV_OR_ACCOUNT" \
            -reconfigure \
            -no-color 2>&1 | "$STDOUT_TO_CWLOGS_SCRIPT"
        else
          TF_WORKSPACE=default tofu init \
            -var parent_env="$PARENT_ENV" \
            -reconfigure \
            -no-color 2>&1 | "$STDOUT_TO_CWLOGS_SCRIPT"
        fi
        echo "tofu init for \"$ENV_OR_ACCOUNT\" completed"

        if [[ $SERVICE_TYPE == "PLATFORM" ]]; then
          tofu workspace select \
            -no-color \
            -var account_type="$ENV_OR_ACCOUNT" \
            -or-create "$ENV_OR_ACCOUNT" 2>&1 | "$STDOUT_TO_CWLOGS_SCRIPT"
        else
          tofu workspace select \
            -no-color \
            -var parent_env="$PARENT_ENV" \
            -or-create "$ENV_OR_ACCOUNT" 2>&1 | "$STDOUT_TO_CWLOGS_SCRIPT"
        fi
        echo "Selected workspace \"$ENV_OR_ACCOUNT\""
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.service-path }}

      # We split Tofu steps into "start"/"do"/"end" steps in order to attempt to avoid GitHub
      # Actions' poor signaling behavior on exit.
      # See the README of https://github.com/ringerc/github-actions-signal-handling-demo and
      # https://github.com/orgs/community/discussions/26311
    - name: Start OpenTofu Plan
      env:
        SERVICE_PATH: ${{ inputs.service-path }}
      run: |
        echo "Generating OpenTofu plan for $SERVICE_PATH..."
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.service-path }}

      # Having this "exec ..." be the first command should ensure that the wrapper script is the
      # "leader" process
    - name: Do OpenTofu plan
      run: |
        exec "$TOFU_CI_SCRIPT" plan ${{ steps.setup-tofu.outputs.tf-vars-args }} -no-color \
          -out=tfplan 2>&1 | "$STDOUT_TO_CWLOGS_SCRIPT"
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.service-path }}

    - name: End OpenTofu plan
      env:
        SERVICE_PATH: ${{ inputs.service-path }}
      run: |
        echo "Plan generated for $SERVICE_PATH successfully"
      shell: bash

    - name: Start apply env service
      if: ${{ inputs.skip-apply != 'true' }}
      env:
        SERVICE_PATH: ${{ inputs.service-path }}
      run: |
        echo "Applying OpenTofu plan for $SERVICE_PATH..."
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.service-path }}

    - name: Do apply env service
      if: ${{ inputs.skip-apply != 'true' }}
      run: |
        exec "$TOFU_CI_SCRIPT" apply -no-color -input=false tfplan 2>&1 | "$STDOUT_TO_CWLOGS_SCRIPT"
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.service-path }}

    - name: End apply env service
      if: ${{ inputs.skip-apply != 'true' }}
      env:
        SERVICE_PATH: ${{ inputs.service-path }}
      run: |
        echo "OpenTofu plan for $SERVICE_PATH applied"
      shell: bash

    - name: Force-unlock tofu state (on failure/cancel)
      if: failure() || cancelled()
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail

        run_with_auto_unlock() {
          # Run the command, capture output
          set +e
          out="$("$@" 2>&1)"
          rc=$?
          set -e

          if [[ $rc -eq 0 ]]; then
            return 0
          fi

          # Detect lock failure + extract ID
          if echo "$out" | grep -q "Error acquiring the state lock" && echo "$out" | grep -q "Lock Info:"; then
            lock_id="$(echo "$out" | grep ' ID: ' | cut -d: -f2 | tr -d ' ' || true)"
            if [[ -n "${lock_id:-}" ]]; then
              echo "Detected lock; force-unlocking: $lock_id"
              tofu force-unlock -force "$lock_id" -no-color
              return 0
            fi
          fi

          return $rc
        }

        run_with_auto_unlock tofu plan -no-color -refresh=false -lock-timeout=10s
      working-directory: ${{ github.workspace }}/${{ inputs.service-path }}
